name: Android CI/CD

on:
  push:
    branches: [ "main", "new" ]
    tags:
      - 'release*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔐 Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > release.jks

      - name: ⚙️ Grant permission
        run: chmod +x source/gradlew

      - name: 🏗️ Build APK
        run: |
          cd source
          ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=../release.jks \
          -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
          -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
          -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: 📦 Rename APK
        run: |
          mv source/app/build/outputs/apk/release/*.apk app-release.apk

      - name: 📝 Generate Changelog
        run: |
          git log --pretty=format:"- %s" > CHANGELOG.txt

      # 🚀 Create GitHub Release (only on release tag)
      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/release')
        uses: softprops/action-gh-release@v2
        with:
          name: APK-${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: CHANGELOG.txt
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 📲 Upload APK to Telegram Topic
      - name: 📲 Upload APK to Telegram Topic
        if: startsWith(github.ref, 'refs/tags/release')
        run: |
          VERSION="${{ github.ref_name }}"
          CHANGELOG=$(cat CHANGELOG.txt | head -c 900)

          CAPTION=$(printf "🚀 *New Build Released*\n\n🔢 *Version:* %s\n\n📋 *Changes:*\n%s" "$VERSION" "$CHANGELOG")

          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F message_thread_id="${{ secrets.TELEGRAM_THREAD_ID }}" \
            -F document=@app-release.apk \
            -F caption="$CAPTION" \
            -F parse_mode="Markdown"
